name: Daily Brightcove + Moodle Collect

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        env:
          BC_CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          BC_CLIENT_SECRET: ${{ secrets.BC_CLIENT_SECRET }}
          BC_ACCOUNT_ID: ${{ secrets.BC_ACCOUNT_ID }}
          MOODLE_URL: ${{ secrets.MOODLE_URL }}
          MOODLE_TOKEN: ${{ secrets.MOODLE_TOKEN }}
          LOOKBACK_DAYS: '90'
        run: node dashboard/collect.mjs

      - name: Commit data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          if ! git diff --cached --quiet; then
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No changes to commit"
          fi
