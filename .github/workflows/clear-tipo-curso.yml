name: Clear tipo_de_curso

on:
  workflow_dispatch: {}

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run clear-tipo-curso
        env:
          BC_CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          BC_CLIENT_SECRET: ${{ secrets.BC_CLIENT_SECRET }}
          BC_ACCOUNT_ID: ${{ secrets.BC_ACCOUNT_ID }}
        run: node dashboard/clear-tipo-curso.mjs
